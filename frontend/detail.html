<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Return Detail — Device Return Tracker</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<!-- SIDEBAR -->
<aside class="sidebar">
  <a class="brand" href="index.html">
    <div class="brand-icon">📦</div>
    Device Returns
  </a>
  
  <div class="user-chip">
    <div class="avatar" id="user-avatar">?</div>
    <div style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:600;" id="user-name">…</div>
  </div>

    <div class="nav-links">
    <a class="nav-link" href="index.html">🏠 Dashboard</a>
    <a class="nav-link" href="bookings.html">📝 Rental Bookings</a>
    <a class="nav-link" href="return-form.html">📦 Return Form</a>
    <a class="nav-link" href="analytics.html">📊 Analytics</a>
    <a class="nav-link" href="kyc.html">📋 KYC</a>
    <a class="nav-link" href="logistics.html">🚚 Logistics</a>
    <a class="nav-link" href="maintenance.html">🔧 Maintenance</a>
    <a class="nav-link" href="qr-scan.html">📷 QR Scan</a>
    <a class="nav-link admin-only" href="admin.html" style="display:none">⚙️ Admin</a>
    <a class="nav-link admin-only" href="audit.html" style="display:none">📋 Audit</a>
  </div>

  <div class="sidebar-footer">
    <button class="theme-toggle-btn" onclick="toggleTheme()">🌓 Toggle Theme</button>
    <button class="btn-logout" onclick="doLogout()">🚪 Logout</button>
  </div>
</aside>

<!-- MAIN CONTENT -->
<main class="main-content">

<div class="page-inner">
  <a class="back-btn" href="index.html">← Back to Dashboard</a>
  <div id="main-content"><div class="loading"><div class="icon">⏳</div><p>Loading record details…</p></div></div>
</div>
<div id="toast"></div>

</main>
<script>
  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || 'null');
    if (!token || !user) window.location.href = 'login.html';
  const unameEl = document.getElementById('user-name');
  if (unameEl) unameEl.textContent = user?.name || '';
  const uavatarEl = document.getElementById('user-avatar');
  if (uavatarEl) uavatarEl.textContent = (user?.name||'?').charAt(0).toUpperCase();
  if (user?.role === 'admin') {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
  }
  function doLogout() { localStorage.clear(); window.location.href = 'login.html'; }
  const H   = () => ({ 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` });
  const API = 'http://localhost:5000/api';
  const urlParams = new URLSearchParams(window.location.search);
  const recordId  = urlParams.get('id');

  if (!recordId) {
    document.getElementById('main-content').innerHTML = '<div class="loading"><div class="icon">❌</div><p>No record ID in URL. <a href="index.html">Go to Dashboard</a></p></div>';
  } else { loadDetail(); }

  async function loadDetail() {
    try {
      const [recRes, photoRes] = await Promise.all([
        fetch(`${API}/returns/${recordId}`, { headers: {'Authorization':`Bearer ${token}`} }),
        fetch(`${API}/upload/damage/${recordId}`, { headers: {'Authorization':`Bearer ${token}`} })
      ]);
      const rec   = await recRes.json();
      const photos= await photoRes.json();
      if (!rec.success) throw new Error(rec.message);
      render(rec.data, photos.data || []);
    } catch(err) {
      document.getElementById('main-content').innerHTML = `<div class="loading"><div class="icon">⚠️</div><p style="color:#dc2626">${err.message}</p><br/><a href="index.html" class="btn btn-ghost" style="margin-top:12px">← Back</a></div>`;
    }
  }

  function render(r, photos) {
    const cc = {'Good':'badge-good','Minor Scratches':'badge-minor','Major Damage':'badge-major','Non-Functional':'badge-nonfunc'};
    const sc = {'Pending':'badge-pending','Approved':'badge-approved','Settled':'badge-settled','Rejected':'badge-rejected'};
    let aiEstimate = null;
    try { if (r.ai_repair_estimate) aiEstimate = JSON.parse(r.ai_repair_estimate); } catch(e) {}

    document.title = `Return #${r.id} — ${r.device_name} — Device Return Tracker`;

    document.getElementById('main-content').innerHTML = `
      <div class="page-header">
        <div>
          <div class="page-title">Return Record #${r.id}</div>
          <div class="page-sub">Booking #${r.booking_id} · Recorded ${fmtDateTime(r.created_at)}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="badge ${cc[r.device_condition]||''}">${r.device_condition}</span>
          <span class="badge ${sc[r.settlement_status]||''}">${r.settlement_status}</span>
        </div>
      </div>

      <div class="action-bar">
        ${r.settlement_status === 'Pending' ? `
        <button class="btn btn-primary" onclick="approveSettlement()">✅ Approve</button>
        <button class="btn btn-ghost" onclick="rejectSettlement()">❌ Reject</button>
        ` : ''}
        ${r.settlement_status === 'Approved' ? `
        <button class="btn btn-primary" onclick="markSettled()">💰 Mark Settled</button>
        ` : ''}
        <button class="btn btn-whatsapp" onclick="sendWhatsApp()">📱 WhatsApp Customer</button>
        <button class="btn btn-ai"       onclick="runAI()">🤖 Run AI Analysis</button>
        <button class="btn btn-ghost"    onclick="window.print()">🖨️ Print</button>
        <a class="btn btn-ghost"         href="index.html">← Dashboard</a>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-title">👤 Customer & Device Info</div>
          <div class="info-grid">
            <div class="info-item"><div class="il">Customer Name</div><div class="iv">${r.customer_name||'—'}</div></div>
            <div class="info-item"><div class="il">Phone</div><div class="iv">${r.customer_phone||'—'}</div></div>
            <div class="info-item"><div class="il">Device</div><div class="iv">${r.device_name||'—'}</div></div>
            <div class="info-item"><div class="il">Serial Number</div><div class="iv" style="font-family:monospace">${r.serial_number||'—'}</div></div>
            <div class="info-item"><div class="il">Rental Start</div><div class="iv">${fmtDate(r.rental_start)}</div></div>
            <div class="info-item"><div class="il">Return Date</div><div class="iv">${fmtDate(r.return_date)}</div></div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">💰 Financial Settlement</div>
          <div class="info-grid" style="margin-bottom:14px">
            <div class="info-item"><div class="il">Deposit Held</div><div class="iv">₹${fmt(r.deposit_amount)}</div></div>
            <div class="info-item"><div class="il">Repair Cost</div><div class="iv" style="color:#dc2626">₹${fmt(r.repair_cost)}</div></div>
            <div class="info-item"><div class="il">Deducted</div><div class="iv" style="color:#d97706">₹${fmt(r.deposit_deduction)}</div></div>
            <div class="info-item"><div class="il">Approved By</div><div class="iv">${r.approved_by||'Pending'}</div></div>
          </div>
          <div class="refund-box">
            <div class="refund-label">Refund Amount</div>
            <div class="fin-highlight">₹${fmt(r.deposit_refund)}</div>
            <div style="margin-top:4px"><span class="badge ${sc[r.settlement_status]||''}">${r.settlement_status}</span></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🔧 Damage Assessment</div>
        <div class="info-grid" style="margin-bottom:${r.damage_description?'14px':'0'}">
          <div class="info-item"><div class="il">Condition on Return</div><div class="iv"><span class="badge ${cc[r.device_condition]||''}">${r.device_condition}</span></div></div>
          <div class="info-item"><div class="il">Staff Notes</div><div class="iv">${r.notes||'—'}</div></div>
        </div>
        ${r.damage_description ? `<div class="il" style="margin-bottom:6px">Damage Description</div><div style="font-size:13px;line-height:1.7;color:var(--text-1);padding:12px;background:var(--bg);border-radius:7px;border:1px solid var(--border)">${r.damage_description}</div>` : ''}
      </div>

      <div class="card">
        <div class="card-title">🤖 AI Analysis ${r.ai_damage_summary?'<span style="background:#f5f3ff;color:#6d28d9;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600">✓ Done</span>':'<span style="background:#fff7ed;color:#9a3412;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600">Not Run</span>'}</div>
        ${r.ai_damage_summary ? `
          <div class="ai-label">AI Damage Summary</div>
          <div class="ai-box" style="margin-bottom:${aiEstimate?'16px':'0'}">${r.ai_damage_summary}</div>
          ${aiEstimate ? `
          <div class="ai-label" style="margin-top:14px">AI Repair Cost Estimate</div>
          <div class="estimate-row">
            <div class="est-card"><div class="est-label">Min</div><div class="est-value">₹${aiEstimate.min_estimate||0}</div></div>
            <div class="est-card"><div class="est-label">Recommended</div><div class="est-value">₹${aiEstimate.recommended||0}</div></div>
            <div class="est-card"><div class="est-label">Max</div><div class="est-value">₹${aiEstimate.max_estimate||0}</div></div>
          </div>
          ${aiEstimate.reasoning?`<div style="font-size:12px;color:var(--text-2);margin-top:8px;font-style:italic">💡 ${aiEstimate.reasoning}</div>`:``}
          `:``}
        ` : `
          <div style="text-align:center;padding:24px;color:var(--text-3)">
            <p style="margin-bottom:12px">No AI analysis yet. Run AI to get damage summary and repair cost estimate.</p>
            <button class="btn btn-ai" onclick="runAI()">🤖 Generate AI Analysis</button>
          </div>`}
      </div>

      <div class="card">
        <div class="card-title">📸 Before/After Photo Comparison</div>
        
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:12px">
          <!-- BEFORE -->
          <div>
            <div style="font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:8px">BEFORE (At Rental Start)</div>
            <div class="photo-item" style="border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;aspect-ratio:16/9;background:var(--surface-hover)">
              <div style="text-align:center;color:var(--text-3)">
                <div style="font-size:24px;margin-bottom:4px">✅</div>
                <div style="font-size:12px">Condition: Good</div>
                <div style="font-size:10px;opacity:0.7">No pre-rental photos on record</div>
              </div>
            </div>
          </div>
          
          <!-- AFTER -->
          <div>
            <div style="font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:8px">AFTER (At Return)</div>
            ${photos.length ? `
            <div class="photo-grid" style="grid-template-columns:1fr">
              ${photos.map(p=>`
              <div class="photo-item" onclick="window.open('${p.photo_url}','_blank')" title="Click to view full size" style="aspect-ratio:16/9">
                <img src="${p.thumbnail_url||p.photo_url}" loading="lazy" alt="Damage photo" style="object-fit:cover"/>
              </div>`).join('')}
            </div>` : `<div class="no-photos" style="aspect-ratio:16/9">☁️ No damage photos uploaded.</div>`}
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📋 Activity Timeline</div>
        <div class="timeline">
          <div class="tl-item">
            <div class="tl-dot">📦</div>
            <div class="tl-body">
              <div class="tl-title">Return Record Created</div>
              <div class="tl-time">${fmtDateTime(r.created_at)}</div>
              <div class="tl-note">Condition: ${r.device_condition} · Repair Cost: ₹${fmt(r.repair_cost)}</div>
            </div>
          </div>
          ${photos.map(p=>`
          <div class="tl-item">
            <div class="tl-dot">📷</div>
            <div class="tl-body">
              <div class="tl-title">Damage Photo Uploaded</div>
              <div class="tl-time">${fmtDateTime(p.uploaded_at)}</div>
              <div class="tl-note">☁️ Saved to Cloudinary${p.description?` · ${p.description}`:``}</div>
            </div>
          </div>`).join('')}
          ${r.ai_damage_summary ? `
          <div class="tl-item">
            <div class="tl-dot">🤖</div>
            <div class="tl-body">
              <div class="tl-title">AI Analysis Completed</div>
              <div class="tl-time">Gemini AI</div>
              <div class="tl-note">Damage summary and repair estimate generated</div>
            </div>
          </div>` : ''}
          ${r.approved_by ? `
          <div class="tl-item">
            <div class="tl-dot">${r.settlement_status==='Approved'?'✅':r.settlement_status==='Rejected'?'❌':'✔'}</div>
            <div class="tl-body">
              <div class="tl-title">Settlement: ${r.settlement_status}</div>
              <div class="tl-time">By ${r.approved_by}</div>
              ${r.notes?`<div class="tl-note">${r.notes}</div>`:``}
            </div>
          </div>` : ''}
          <div class="tl-item">
            <div class="tl-dot">🔄</div>
            <div class="tl-body">
              <div class="tl-title">Last Updated</div>
              <div class="tl-time">${fmtDateTime(r.updated_at)}</div>
            </div>
          </div>
        </div>
      </div>`;

    // Store r for WhatsApp use
    window._record = r;
  }

  async function runAI() {
    showToast('🤖 Running AI analysis…', 'success');
    try {
      const res  = await fetch(`${API}/ai/auto-fill/${recordId}`, { method:'POST', headers:H() });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      showToast('✅ AI analysis saved!', 'success');
      loadDetail();
    } catch(err) { showToast('AI error: '+err.message, 'error'); }
  }

  async function sendWhatsApp() {
    try {
      const res  = await fetch(`${API}/whatsapp/notify-settlement`, { method:'POST', headers:H(), body:JSON.stringify({returnId:recordId}) });
      const json = await res.json();
      if (json.wa_link) { window.open(json.wa_link,'_blank'); showToast('📱 WhatsApp opened!','success'); }
      else if (json.success) { showToast('📱 WhatsApp sent via Twilio!','success'); }
    } catch(err) { showToast('WhatsApp error: '+err.message,'error'); }
  }

  async function approveSettlement() {
    if(!confirm('Approve this settlement? An AI email will be drafted and sent.')) return;
    try {
      const res = await fetch(`${API}/settlement/${recordId}/approve`, { method:'PUT', headers:H() });
      const json = await res.json();
      if(!json.success) throw new Error(json.message);
      showToast(json.message, 'success');
      loadDetail();
    } catch(err) { showToast(err.message, 'error'); }
  }

  async function rejectSettlement() {
    const reason = prompt('Reason for rejection:');
    if(reason === null) return;
    try {
      const res = await fetch(`${API}/settlement/${recordId}/reject`, { method:'PUT', headers:H(), body:JSON.stringify({reason:reason}) });
      const json = await res.json();
      if(!json.success) throw new Error(json.message);
      showToast(json.message, 'success');
      loadDetail();
    } catch(err) { showToast(err.message, 'error'); }
  }

  async function markSettled() {
    if(!confirm('Mark this return as fully settled?')) return;
    try {
      const res = await fetch(`${API}/settlement/${recordId}/settle`, { method:'PUT', headers:H() });
      const json = await res.json();
      if(!json.success) throw new Error(json.message);
      showToast(json.message, 'success');
      loadDetail();
    } catch(err) { showToast(err.message, 'error'); }
  }

  const fmt         = n => parseFloat(n||0).toFixed(2);
  const fmtDate     = d => d ? new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—';
  const fmtDateTime = d => d ? new Date(d).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
  function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`show ${type}`;setTimeout(()=>{t.className='';},3500);}
</script>

<script>
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const newTheme = current === 'dark' ? 'light' : 'dark';
    if (newTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
    localStorage.setItem('theme', newTheme);
  }
</script>
</body>
</html>
