<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — Device Return Tracker</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }
    
    /* Animated Particles Background */
    .particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
      animation: float-particle linear infinite;
    }
    @keyframes float-particle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
    }

    .login-card {
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 40px rgba(255, 255, 255, 0.1);
      position: relative;
      z-index: 1;
      animation: scaleIn .5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .login-icon {
      width: 72px; height: 72px;
      background: transparent;
      border: 1px solid #fff;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 0 auto 24px;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
      animation: float 4s ease-in-out infinite;
    }

    .login-title {
      font-size: 26px; font-weight: 800; text-align: center;
      color: #fff; letter-spacing: -0.5px;
      font-family: 'Outfit', sans-serif;
    }
    .login-sub {
      font-size: 14px; color: var(--text-3); text-align: center;
      margin-top: 8px; margin-bottom: 32px;
    }

    .tabs {
      display: flex;
      background: rgba(0,0,0,0.3);
      border-radius: var(--radius);
      padding: 6px;
      margin-bottom: 28px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .tab {
      flex: 1; padding: 10px; text-align: center;
      border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
      color: var(--text-3); cursor: pointer; transition: var(--trans);
    }
    .tab.active {
      background: #ffffff;
      color: #000000;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.4);
    }

    .err-box, .success-box {
      border-radius: var(--radius); padding: 12px 16px;
      font-size: 13px; margin-bottom: 20px; display: none;
      animation: fadeIn .3s ease;
      backdrop-filter: blur(4px);
    }
    .err-box { background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.5); color: #fff; }
    .err-box.show { display: block; }
    .success-box { background: #fff; border: 1px solid #fff; color: #000; font-weight: bold; }
    .success-box.show { display: block; }

    .footer-link { text-align: center; font-size: 12px; color: var(--text-4); margin-top: 24px; }
  </style>

  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  
  <div class="particles" id="particles"></div>

  <div class="login-card">
    <div class="login-icon">📦</div>
    <div class="login-title">Device Return Tracker</div>
    <div class="login-sub">One Point Solutions — Internship Project</div>

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>

    <div class="err-box" id="err-box"></div>
    <div class="success-box" id="success-box"></div>

    <!-- LOGIN FORM -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="admin@example.com" required/>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn" style="padding: 14px; font-size: 15px; margin-top: 10px;">Sign In →</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" onsubmit="handleRegister(event)" style="display:none">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" placeholder="John Doe" required/>
      </div>
      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" placeholder="admin@example.com" required/>
      </div>
      <div class="form-group">
        <label for="reg-phone">Phone Number</label>
        <input type="tel" id="reg-phone" placeholder="10-digit mobile number" required pattern="[0-9]{10}"/>
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="register-btn" style="padding: 14px; font-size: 15px; margin-top: 10px;">Create Account</button>
    </form>

    <button class="theme-toggle-btn" style="margin-top:20px; width:100%; border:1px solid var(--border); padding:10px; background:var(--surface); color:var(--text-1); border-radius:var(--radius-sm); cursor:pointer;" onclick="toggleTheme()">🌓 Toggle Theme</button>
    <div class="footer-link">Secure access requires authorized credentials.</div>
  </div>

<script>
  // Generate Particles
  const pContainer = document.getElementById('particles');
  for(let i=0; i<15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 8 + 4;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (Math.random() * 10 + 10) + 's';
    p.style.animationDelay = (Math.random() * 5) + 's';
    pContainer.appendChild(p);
  }

  const API = 'http://localhost:5000/api/auth';

  if (localStorage.getItem('token')) {
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (user.role === 'customer') window.location.href = 'customer-dashboard.html';
    else window.location.href = 'index.html';
  }

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab==='login');
    document.getElementById('tab-register').classList.toggle('active', tab==='register');
    document.getElementById('login-form').style.display    = tab==='login' ? '' : 'none';
    document.getElementById('register-form').style.display = tab==='register' ? '' : 'none';
    hideMessages();
  }

  function hideMessages() {
    document.getElementById('err-box').classList.remove('show');
    document.getElementById('success-box').classList.remove('show');
  }

  function showError(msg) {
    const e = document.getElementById('err-box');
    e.textContent = msg; e.classList.add('show');
    document.getElementById('success-box').classList.remove('show');
  }

  function showSuccess(msg) {
    const s = document.getElementById('success-box');
    s.textContent = msg; s.classList.add('show');
    document.getElementById('err-box').classList.remove('show');
  }

  async function handleLogin(e) {
    e.preventDefault();
    hideMessages();
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Authenticating…';
    try {
      const res  = await fetch(`${API}/login`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          email: document.getElementById('login-email').value,
          password: document.getElementById('login-password').value
        })
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      localStorage.setItem('token', json.token);
      localStorage.setItem('user', JSON.stringify(json.user));
      if (json.user.role === 'customer') {
        window.location.href = 'customer-dashboard.html';
      } else {
        window.location.href = 'index.html';
      }
    } catch(err) {
      showError(err.message || 'Login failed. Check backend connection.');
      btn.disabled = false; btn.textContent = 'Sign In →';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    hideMessages();
    const btn = document.getElementById('register-btn');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      const res  = await fetch(`${API}/register`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          name: document.getElementById('reg-name').value,
          email: document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value,
          phone: document.getElementById('reg-phone').value
        })
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      showSuccess('✅ Account created! Please login now.');
      setTimeout(() => switchTab('login'), 1500);
    } catch(err) {
      showError(err.message || 'Registration failed.');
    } finally {
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }
</script>

<script>
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const newTheme = current === 'dark' ? 'light' : 'dark';
    if (newTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
    localStorage.setItem('theme', newTheme);
  }
</script>
</body>
</html>
